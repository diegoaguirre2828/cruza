name: Sync Cruzar Insights manifest

# Pulls the v0.5 manifest.json from cruzar-insights-ml main and refreshes
# data/insights-manifest.json in this repo if the contents changed.
#
# Why: /insights renders from data/insights-manifest.json at module load.
# Without this sync, the page goes stale within a week of the next retrain.
#
# Schedule: Mondays at 07:00 UTC, one hour after cruzar-insights-ml's
# weekly-retrain.yml (Sundays 06:00 UTC). One-directional pull from a
# PRIVATE source repo using a read-only fine-grained PAT.
#
# Required secret (one-time setup — without this the workflow 404s):
#   CRUZAR_INSIGHTS_ML_TOKEN
#     Fine-grained PAT scoped to diegoaguirre2828/cruzar-insights-ml
#     with READ-ONLY "Contents" repository permission.
#     Generate at github.com/settings/personal-access-tokens/new
#     Add at github.com/diegoaguirre2828/cruzar/settings/secrets/actions

on:
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC
  workflow_dispatch:       # allow manual run

concurrency:
  group: insights-manifest-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest manifest from cruzar-insights-ml (private)
        env:
          GH_TOKEN: ${{ secrets.CRUZAR_INSIGHTS_ML_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CRUZAR_INSIGHTS_ML_TOKEN secret is not set."
            echo "Create a fine-grained PAT with READ-ONLY Contents access to"
            echo "diegoaguirre2828/cruzar-insights-ml and add it as a repo secret."
            exit 1
          fi
          gh api \
            -H "Accept: application/vnd.github.raw+json" \
            "/repos/diegoaguirre2828/cruzar-insights-ml/contents/artifacts/v05/manifest.json?ref=main" \
            > /tmp/manifest.json

      - name: Diff vs current snapshot
        id: diff
        run: |
          if cmp -s /tmp/manifest.json data/insights-manifest.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No manifest changes — /insights snapshot already current."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            cp /tmp/manifest.json data/insights-manifest.json
            echo "Manifest updated. Preview of new model_version + saved_at:"
            python -c "import json; m = json.load(open('data/insights-manifest.json')); print(f'  model_version={m[\"model_version\"]}'); print(f'  saved_at={m[\"saved_at\"]}'); print(f'  ports={len(m[\"ports\"])}')"
          fi

      - name: Commit + push refreshed snapshot
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/insights-manifest.json
          git commit -m "chore(insights): sync manifest from cruzar-insights-ml ($(date -u +%Y-%m-%d))

          Auto-generated by .github/workflows/sync-insights-manifest.yml
          Source: cruzar-insights-ml/artifacts/v05/manifest.json (main)"
          git push
