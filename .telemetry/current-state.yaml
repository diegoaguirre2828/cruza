# Current State: reverse-engineered tracking inventory
# Scanned: 2026-04-26
# SDK: in-house (Vercel Analytics + custom server-side app_events table)
# Note: 81 trackEvent() call sites across 37 files; share + click trackers in addition.

sdk:
  product_analytics: none-installed
  in_house_wrapper:
    file: lib/trackEvent.ts
    sinks:
      - "@vercel/analytics (track function — page-view product, NOT a full product analytics tool)"
      - "POST /api/events/track -> Supabase table app_events (custom server log)"
  related_in_house_modules:
    - lib/trackClick.ts (POST /api/track/click)
    - lib/trackShare.ts (POST /api/user/share-event)
    - lib/useSessionPing.ts (POST /api/user/touch — heartbeat for last_seen_at, NOT events)
  external_observability:
    - "@sentry/nextjs (error monitoring + 10% perf traces + replay-on-error)"
    - "@vercel/speed-insights (Web Vitals)"

