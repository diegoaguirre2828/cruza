# Track-share / Track-click — separate codepaths (server endpoints, not Vercel Analytics)
share_events:
  endpoint: POST /api/user/share-event
  callers:
    - components/HeroLiveDelta.tsx (copy, whatsapp, facebook channels)
    - components/SharePrompt.tsx (native, native_success, copy, whatsapp)
    - components/PortCard.tsx (native)
    - components/ReportForm.tsx (whatsapp, copy)
    - components/LiveCameraTile.tsx (native)
    - components/JustCrossedPrompt.tsx (whatsapp, copy)
    - app/port/[portId]/PortDetailClient.tsx (native, copy)
  payload: {channel, context}

click_events:
  endpoint: POST /api/track/click
  callers:
    - app/negocios/page.tsx (phone, whatsapp, website)
  payload: {business_id, click_type, port_id?, referrer?} OR {url, context?, port_id?}

identity:
  identify_calls: []
  group_calls: []
  observed_user_resolution:
    - "Server route /api/events/track resolves auth.getUser() at write time and stamps app_events.user_id when available — analogous to identify but only at write time, no traits set."
    - "Server route /api/user/touch upserts profile traits (last_seen_device, last_seen_os, last_seen_browser, install_state, first_seen_at, last_seen_at) on signed-in users via heartbeat."
  reset_on_logout: not_observed
  session_id_cookie: "sessionStorage key cruzar_session_id_v1, generated client-side, base36 timestamp + random"

patterns:
  naming_style: snake_case (consistent across all 81 trackEvent call sites)
  centralized: yes (single lib/trackEvent.ts wrapper used everywhere); shares + clicks have separate wrappers
  centralized_definitions: no (event names are inlined string literals at each call site, not enumerated in one file)
  client_vs_server: client-side only (trackEvent fires from browser; server log written by API route)
  type_safety: weak (event_name is `string`; props is `Record<string, string|number|boolean|null|undefined>`)
  pii_in_props: none observed (no email, phone, name in property keys scanned)
  pricing_tier_in_props: partial (one_tap_alert_* events pass `tier`; most events do not)
  group_dimension_in_props: none (no business_account_id ever passed; Business tier events have no account context)
  duplication: |
    - 4 call sites for `report_submitted` with overlapping but non-identical property keys.
    - 5 call sites for `affiliate_clicked` with varying property shapes.
    - 3 call sites for `alert_created`.
    - `pwa_grant_pending` fires from two distinct components.
  destination_coverage: |
    Vercel Analytics receives every trackEvent call but is a page-view product — no funnels, no retention cohorts, no group analytics.
    The app_events Supabase table is queryable but only surfaces in admin tile (GrowthEventsTile.tsx) which counts events per name in last 7/30 days — no per-user funnel, no conversion %, no cohort.
  installed_but_unused_for_product_analytics: |
    Sentry, Speed Insights, Vercel Analytics — all wired in lib/instrumentation-client.ts and app/layout.tsx but none track product behaviour.
