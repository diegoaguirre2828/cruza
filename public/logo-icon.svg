<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue square background (Cruzar accent blue) -->
  <rect width="100" height="100" rx="22" fill="#2563eb"/>

  <!-- Bridge road base (dark navy — reads as black) -->
  <rect x="12" y="66" width="76" height="6" rx="3" fill="#0f172a"/>

  <!-- Left tower -->
  <rect x="23" y="28" width="7" height="38" rx="2" fill="#0f172a"/>
  <!-- Right tower -->
  <rect x="70" y="28" width="7" height="38" rx="2" fill="#0f172a"/>

  <!-- Tower tops -->
  <rect x="21" y="24" width="11" height="6" rx="2" fill="#0f172a"/>
  <rect x="68" y="24" width="11" height="6" rx="2" fill="#0f172a"/>

  <!-- Main suspension arc -->
  <path d="M 26 27 Q 50 10 74 27" stroke="#0f172a" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Hanging cables -->
  <line x1="36" y1="21.5" x2="36" y2="66" stroke="#0f172a" stroke-width="1.6" opacity="0.75"/>
  <line x1="50" y1="16"   x2="50" y2="66" stroke="#0f172a" stroke-width="1.6" opacity="0.75"/>
  <line x1="64" y1="21.5" x2="64" y2="66" stroke="#0f172a" stroke-width="1.6" opacity="0.75"/>

  <!-- Road dashes (blue again to cut through the road) -->
  <rect x="44" y="67.5" width="12" height="3" rx="1.5" fill="#2563eb" opacity="0.9"/>
</svg>
